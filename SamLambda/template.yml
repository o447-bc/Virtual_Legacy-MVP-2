AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: |
  Virtual-Legacy-MVP-1
  SAM Template for Virtual-Legacy-MVP-1 - v2

Parameters:
  ExistingUserPoolId:
    Type: String
    Default: us-east-1_KsG65yYlo
    Description: Existing Cognito User Pool ID
  ExistingUserPoolArn:
    Type: String
    Default: arn:aws:cognito-idp:us-east-1:962214556635:userpool/us-east-1_KsG65yYlo
    Description: Existing Cognito User Pool ARN
  SecurityAlertEmail:
    Type: String
    Default: ''
    Description: Email address for GuardDuty security alerts (leave empty to skip email subscription)

# More info about Globals: https://github.com/awslabs/serverless-application-model/blob/master/docs/globals.rst
Globals:
  Function:
    Timeout: 10
    MemorySize: 128
    Runtime: python3.12
    Environment:
      Variables:
        ALLOWED_ORIGIN: 'https://www.soulreel.net'
        APP_BASE_URL: 'https://www.soulreel.net'
        S3_BUCKET: 'virtual-legacy'
        TABLE_ENGAGEMENT: 'EngagementDB'
        TABLE_QUESTION_STATUS: 'userQuestionStatusDB'
        TABLE_QUESTION_PROGRESS: 'userQuestionLevelProgressDB'
        TABLE_RELATIONSHIPS: 'PersonaRelationshipsDB'
        TABLE_ACCESS_CONDITIONS: 'AccessConditionsDB'
        TABLE_ALL_QUESTIONS: 'allQuestionDB'
        TABLE_USER_STATUS: 'userStatusDB'
        TABLE_SIGNUP_TEMP: 'PersonaSignupTempDB'
        TABLE_WS_CONNECTIONS: 'WebSocketConnectionsDB'
        TABLE_SUBSCRIPTIONS: 'UserSubscriptionsDB'
        # Set to 'true' to enable server-side persona enforcement (Phase 2 rollout)
        ENFORCE_PERSONA_VALIDATION: 'false'
        TABLE_DATA_RETENTION: !Ref DataRetentionTable
        TABLE_PSYCH_TESTS: !Ref PsychTestsTable
        TABLE_USER_TEST_PROGRESS: !Ref UserTestProgressTable
        TABLE_USER_TEST_RESULTS: !Ref UserTestResultsTable
        TABLE_SYSTEM_SETTINGS: !Ref SystemSettingsTable
        PSYCH_PROFILE_BEDROCK_MODEL: anthropic.claude-3-haiku-20240307-v1:0
  Api:
    Cors:
      AllowMethods: '''GET,POST,PUT,OPTIONS'''
      AllowHeaders: '''Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'''
      # Restrict to known origins. Add localhost variants for local dev via ALLOWED_ORIGIN env var.
      AllowOrigin: '''https://www.soulreel.net'''
    Auth:
      Authorizers:
        CognitoAuthorizer:
          UserPoolArn: !Ref ExistingUserPoolArn

Conditions:
  HasSecurityAlertEmail: !Not [!Equals [!Ref SecurityAlertEmail, '']]

Resources:

  # KMS Customer-Managed Encryption Key for data at rest
  DataEncryptionKey:
    Type: AWS::KMS::Key
    Properties:
      Description: Customer-managed key for encrypting SoulReel data at rest
      EnableKeyRotation: true
      Tags:
        - Key: Project
          Value: SoulReel
        - Key: SecurityPhase
          Value: Phase1
        - Key: CostCenter
          Value: Security
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          # Root account full access (required by AWS)
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub arn:aws:iam::${AWS::AccountId}:root
            Action: kms:*
            Resource: '*'
          
          # CloudWatch Logs encryption/decryption
          - Sid: Allow CloudWatch Logs
            Effect: Allow
            Principal:
              Service: logs.amazonaws.com
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:CreateGrant
              - kms:DescribeKey
            Resource: '*'
            Condition:
              ArnLike:
                kms:EncryptionContext:aws:logs:arn: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*
          
          # Lambda decryption (via service principal)
          - Sid: Allow Lambda Service
            Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action:
              - kms:Decrypt
              - kms:DescribeKey
            Resource: '*'
            Condition:
              StringEquals:
                kms:ViaService: !Sub lambda.${AWS::Region}.amazonaws.com
          
          # DynamoDB encryption/decryption
          - Sid: Allow DynamoDB Service
            Effect: Allow
            Principal:
              Service: dynamodb.amazonaws.com
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:CreateGrant
              - kms:DescribeKey
            Resource: '*'
            Condition:
              StringEquals:
                kms:ViaService: !Sub dynamodb.${AWS::Region}.amazonaws.com
          
          # S3 encryption/decryption
          - Sid: Allow S3 Service
            Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:CreateGrant
              - kms:DescribeKey
            Resource: '*'
            Condition:
              StringEquals:
                kms:ViaService: !Sub s3.${AWS::Region}.amazonaws.com
          
          # CloudTrail encryption
          - Sid: Allow CloudTrail
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action:
              - kms:GenerateDataKey*
              - kms:DecryptDataKey
            Resource: '*'
            Condition:
              StringLike:
                kms:EncryptionContext:aws:cloudtrail:arn: !Sub arn:aws:cloudtrail:*:${AWS::AccountId}:trail/*
          
          # Allow IAM principals with explicit KMS permissions (for presigned URLs)
          # This allows Lambda execution roles to decrypt KMS-encrypted S3 objects
          # when accessed via presigned URLs (which don't go through the service principal)
          # The IAM policies on the Lambda roles control which principals can use this
          - Sid: Allow IAM Principals with KMS Permissions
            Effect: Allow
            Principal:
              AWS: !Sub arn:aws:iam::${AWS::AccountId}:root
            Action:
              - kms:Decrypt
              - kms:DescribeKey
              - kms:GenerateDataKey
            Resource: '*'
            Condition:
              StringEquals:
                kms:CallerAccount: !Ref AWS::AccountId

  # KMS Key Alias for easier reference
  DataEncryptionKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: alias/soulreel-data-encryption
      TargetKeyId: !Ref DataEncryptionKey

  # S3 Bucket for CloudTrail audit logs
  AuditLogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub soulreel-audit-logs-${AWS::AccountId}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !GetAtt DataEncryptionKey.Arn
            BucketKeyEnabled: true
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToGlacier
            Status: Enabled
            Transitions:
              - TransitionInDays: 30
                StorageClass: GLACIER
          - Id: DeleteOldLogs
            Status: Enabled
            ExpirationInDays: 90
      Tags:
        - Key: Project
          Value: SoulReel
        - Key: SecurityPhase
          Value: Phase1
        - Key: CostCenter
          Value: Security

  # Bucket policy to allow CloudTrail to write logs
  AuditLogBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AuditLogBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AWSCloudTrailAclCheck
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !GetAtt AuditLogBucket.Arn
          - Sid: AWSCloudTrailWrite
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub ${AuditLogBucket.Arn}/AWSLogs/${AWS::AccountId}/*
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control

  # CloudTrail trail for data access logging
  DataAccessTrail:
    Type: AWS::CloudTrail::Trail
    DependsOn: AuditLogBucketPolicy
    Properties:
      TrailName: soulreel-data-access-trail
      S3BucketName: !Ref AuditLogBucket
      IsLogging: true
      IsMultiRegionTrail: true
      EnableLogFileValidation: true
      IncludeGlobalServiceEvents: true
      Tags:
        - Key: Project
          Value: SoulReel
        - Key: SecurityPhase
          Value: Phase1
        - Key: CostCenter
          Value: Security
      EventSelectors:
        # S3 data events for virtual-legacy bucket
        - ReadWriteType: All
          IncludeManagementEvents: true
          DataResources:
            - Type: AWS::S3::Object
              Values:
                - arn:aws:s3:::virtual-legacy/*
        # DynamoDB data events for all tables
        - ReadWriteType: All
          IncludeManagementEvents: false
          DataResources:
            - Type: AWS::DynamoDB::Table
              Values:
                - !GetAtt PersonaRelationshipsTable.Arn
                - !GetAtt EngagementTable.Arn
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/userQuestionStatusDB
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/userQuestionLevelProgressDB
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/userStatusDB

  # Data Retention Lifecycle — Audit log bucket with Object Lock for regulatory compliance (3-year retention)
  RetentionAuditBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub soulreel-retention-audit-${AWS::AccountId}
      ObjectLockEnabled: true
      ObjectLockConfiguration:
        ObjectLockEnabled: Enabled
        Rule:
          DefaultRetention:
            Mode: COMPLIANCE
            Years: 3
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !GetAtt DataEncryptionKey.Arn
            BucketKeyEnabled: true
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ArchiveAfterRetention
            Status: Enabled
            Transitions:
              - TransitionInDays: 1095
                StorageClass: DEEP_ARCHIVE
      Tags:
        - Key: Project
          Value: SoulReel
        - Key: Purpose
          Value: DataRetentionAudit

  # Data Retention Lifecycle — Temporary bucket for Content_Package ZIP archives (auto-expire after 7 days)
  ExportsTempBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub soulreel-exports-temp-${AWS::AccountId}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !GetAtt DataEncryptionKey.Arn
            BucketKeyEnabled: true
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireExports
            Status: Enabled
            ExpirationInDays: 7
      Tags:
        - Key: Project
          Value: SoulReel
        - Key: Purpose
          Value: DataExportTemp

  # -----------------------------------------------------------------------
  # Data Retention Lifecycle — S3 Intelligent-Tiering for virtual-legacy bucket
  # The virtual-legacy bucket is NOT managed by CloudFormation (created via AWS console).
  # Apply this lifecycle rule manually via the AWS CLI (one-time command):
  #
  #   aws s3api put-bucket-lifecycle-configuration \
  #     --bucket virtual-legacy \
  #     --lifecycle-configuration '{
  #       "Rules": [
  #         {
  #           "ID": "IntelligentTieringConversations",
  #           "Status": "Enabled",
  #           "Filter": { "Prefix": "conversations/" },
  #           "Transitions": [
  #             { "Days": 30, "StorageClass": "INTELLIGENT_TIERING" }
  #           ]
  #         },
  #         {
  #           "ID": "IntelligentTieringUserResponses",
  #           "Status": "Enabled",
  #           "Filter": { "Prefix": "user-responses/" },
  #           "Transitions": [
  #             { "Days": 30, "StorageClass": "INTELLIGENT_TIERING" }
  #           ]
  #         }
  #       ]
  #     }'
  #
  # Note: Glacier Deep Archive transitions are handled selectively by the
  # StorageLifecycleManager Lambda for legacy-protected content only, because
  # the transition criteria depend on per-user state that S3 lifecycle rules
  # cannot evaluate.
  # -----------------------------------------------------------------------

  # GuardDuty threat detection
  GuardDutyDetector:
    Type: AWS::GuardDuty::Detector
    Properties:
      Enable: true
      FindingPublishingFrequency: FIFTEEN_MINUTES
      DataSources:
        S3Logs:
          Enable: true
      Tags:
        - Key: Project
          Value: SoulReel
        - Key: SecurityPhase
          Value: Phase1
        - Key: CostCenter
          Value: Security

  # SNS topic for security alerts
  SecurityAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: soulreel-security-alerts
      DisplayName: SoulReel Security Alerts
      Tags:
        - Key: Project
          Value: SoulReel
        - Key: SecurityPhase
          Value: Phase1
        - Key: CostCenter
          Value: Security

  # SNS topic policy to allow EventBridge to publish
  SecurityAlertTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref SecurityAlertTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowEventBridgeToPublish
            Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sns:Publish
            Resource: !Ref SecurityAlertTopic

  # SNS email subscription (conditional on parameter)
  SecurityAlertEmailSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasSecurityAlertEmail
    Properties:
      Protocol: email
      TopicArn: !Ref SecurityAlertTopic
      Endpoint: !Ref SecurityAlertEmail

  # EventBridge rule for high-severity GuardDuty findings
  GuardDutyAlertRule:
    Type: AWS::Events::Rule
    Properties:
      Name: soulreel-guardduty-high-severity-alerts
      Description: Route high-severity GuardDuty findings (severity >= 7.0) to SNS
      State: ENABLED
      EventPattern:
        source:
          - aws.guardduty
        detail-type:
          - GuardDuty Finding
        detail:
          severity:
            - numeric:
                - '>='
                - 7.0
      Targets:
        - Arn: !Ref SecurityAlertTopic
          Id: SecurityAlertTopicTarget

  # Gateway Response for CORS on 401 Unauthorized
  GatewayResponseUnauthorized:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      RestApiId: !Ref ServerlessRestApi
      ResponseType: UNAUTHORIZED
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: '''https://www.soulreel.net'''
        gatewayresponse.header.Access-Control-Allow-Headers: '''Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'''
        gatewayresponse.header.Access-Control-Allow-Methods: '''GET,POST,PUT,DELETE,OPTIONS'''

  # Gateway Response for CORS on all 4XX errors
  GatewayResponseDefault4XX:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      RestApiId: !Ref ServerlessRestApi
      ResponseType: DEFAULT_4XX
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: '''https://www.soulreel.net'''
        gatewayresponse.header.Access-Control-Allow-Headers: '''Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'''
        gatewayresponse.header.Access-Control-Allow-Methods: '''GET,POST,PUT,DELETE,OPTIONS'''

  # Gateway Response for CORS on all 5XX errors
  GatewayResponseDefault5XX:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      RestApiId: !Ref ServerlessRestApi
      ResponseType: DEFAULT_5XX
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: '''https://www.soulreel.net'''
        gatewayresponse.header.Access-Control-Allow-Headers: '''Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'''
        gatewayresponse.header.Access-Control-Allow-Methods: '''GET,POST,PUT,DELETE,OPTIONS'''

  # Temporary table for storing persona data during signup process
  PersonaSignupTempTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: PersonaSignupTempDB
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userName
          AttributeType: S
      KeySchema:
        - AttributeName: userName
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !GetAtt DataEncryptionKey.Arn
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  PersonaRelationshipsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: PersonaRelationshipsDB
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: initiator_id
          AttributeType: S
        - AttributeName: related_user_id
          AttributeType: S
      KeySchema:
        - AttributeName: initiator_id
          KeyType: HASH
        - AttributeName: related_user_id
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: RelatedUserIndex
          KeySchema:
            - AttributeName: related_user_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !GetAtt DataEncryptionKey.Arn
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  AccessConditionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AccessConditionsDB
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: relationship_key
          AttributeType: S
        - AttributeName: condition_id
          AttributeType: S
        - AttributeName: condition_type
          AttributeType: S
        - AttributeName: activation_date
          AttributeType: S
      KeySchema:
        - AttributeName: relationship_key
          KeyType: HASH
        - AttributeName: condition_id
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: ConditionTypeIndex
          KeySchema:
            - AttributeName: condition_type
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: ActivationDateIndex
          KeySchema:
            - AttributeName: condition_type
              KeyType: HASH
            - AttributeName: activation_date
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !GetAtt DataEncryptionKey.Arn
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  EngagementTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: EngagementDB
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !GetAtt DataEncryptionKey.Arn
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  WebSocketConnectionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: WebSocketConnectionsDB
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: connectionId
          AttributeType: S
      KeySchema:
        - AttributeName: connectionId
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      SSESpecification:
        SSEEnabled: true

  ConversationStateTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ConversationStateDB
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: connectionId
          AttributeType: S
      KeySchema:
        - AttributeName: connectionId
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !GetAtt DataEncryptionKey.Arn
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  UserSubscriptionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: UserSubscriptionsDB
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: stripeCustomerId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: stripeCustomerId-index
          KeySchema:
            - AttributeName: stripeCustomerId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !GetAtt DataEncryptionKey.Arn
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  # Data Retention Lifecycle — DynamoDB table for tracking exports, deletions, dormancy, legacy protection, and storage metrics
  DataRetentionTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: DataRetentionDB
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: recordType
          AttributeType: S
        - AttributeName: status
          AttributeType: S
        - AttributeName: updatedAt
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: recordType
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: status-index
          KeySchema:
            - AttributeName: status
              KeyType: HASH
            - AttributeName: updatedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !GetAtt DataEncryptionKey.Arn
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  # Psychological Testing Framework — Test metadata table
  PsychTestsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: PsychTestsDB
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: testId
          AttributeType: S
        - AttributeName: version
          AttributeType: S
        - AttributeName: status
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
      KeySchema:
        - AttributeName: testId
          KeyType: HASH
        - AttributeName: version
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: status-index
          KeySchema:
            - AttributeName: status
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !GetAtt DataEncryptionKey.Arn
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  # Psychological Testing Framework — In-progress test responses with TTL
  UserTestProgressTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: UserTestProgressDB
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: testId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: testId
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !GetAtt DataEncryptionKey.Arn
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  # Psychological Testing Framework — Completed test results
  UserTestResultsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: UserTestResultsDB
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: testIdVersionTimestamp
          AttributeType: S
        - AttributeName: testId
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: testIdVersionTimestamp
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: testId-index
          KeySchema:
            - AttributeName: testId
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !GetAtt DataEncryptionKey.Arn
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  # Admin System Settings — Key-value configuration store
  SystemSettingsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: SystemSettingsDB
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: settingKey
          AttributeType: S
      KeySchema:
        - AttributeName: settingKey
          KeyType: HASH
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !GetAtt DataEncryptionKey.Arn
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  # Note: userStatusDB table is managed outside CloudFormation (created via AWS console)
  # Note: Cognito User Pool, Client, Identity Pool, and IAM roles are managed outside CloudFormation
  # The existing User Pool us-east-1_ZUrIoF6al and related resources are referenced via parameters

  # WebSocket API
  ConversationWebSocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: ConversationWebSocketApi
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: $request.body.action

  WebSocketAuthorizer:
    Type: AWS::ApiGatewayV2::Authorizer
    Properties:
      Name: CognitoWebSocketAuthorizer
      ApiId: !Ref ConversationWebSocketApi
      AuthorizerType: REQUEST
      AuthorizerUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WebSocketAuthorizerFunction.Arn}/invocations
      IdentitySource:
        - route.request.querystring.token

  ConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ConversationWebSocketApi
      RouteKey: $connect
      AuthorizationType: CUSTOM
      AuthorizerId: !Ref WebSocketAuthorizer
      Target: !Sub integrations/${ConnectIntegration}

  ConnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ConversationWebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WebSocketConnectFunction.Arn}/invocations

  DisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ConversationWebSocketApi
      RouteKey: $disconnect
      Target: !Sub integrations/${DisconnectIntegration}

  DisconnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ConversationWebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WebSocketDisconnectFunction.Arn}/invocations

  DefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ConversationWebSocketApi
      RouteKey: $default
      Target: !Sub integrations/${DefaultIntegration}

  DefaultIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ConversationWebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WebSocketDefaultFunction.Arn}/invocations

  WebSocketStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref ConversationWebSocketApi
      StageName: prod
      AutoDeploy: true

  # WebSocket Lambda Functions
  WebSocketAuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/conversationFunctions/wsAuthorizer/
      Handler: app.lambda_handler
      Runtime: python3.12
      Architectures:
        - arm64
      Timeout: 10
      Environment:
        Variables:
          USER_POOL_ID: !Ref ExistingUserPoolId
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:GetUser
              Resource: !Ref ExistingUserPoolArn

  WebSocketAuthorizerPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref WebSocketAuthorizerFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ConversationWebSocketApi}/*

  WebSocketConnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/conversationFunctions/wsConnect/
      Handler: app.lambda_handler
      Runtime: python3.12
      Architectures:
        - arm64
      Timeout: 10
      Policies:
        - DynamoDBWritePolicy:
            TableName: !Ref WebSocketConnectionsTable

  WebSocketConnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref WebSocketConnectFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ConversationWebSocketApi}/*

  WebSocketDisconnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/conversationFunctions/wsDisconnect/
      Handler: app.lambda_handler
      Runtime: python3.12
      Architectures:
        - arm64
      Timeout: 10
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:DeleteItem
              Resource: !GetAtt WebSocketConnectionsTable.Arn

  WebSocketDisconnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref WebSocketDisconnectFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ConversationWebSocketApi}/*

  WebSocketDefaultFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/conversationFunctions/wsDefault/
      Handler: app.lambda_handler
      Runtime: python3.12
      Architectures:
        - x86_64
      Timeout: 60
      MemorySize: 512
      Layers:
        - arn:aws:lambda:us-east-1:962214556635:layer:ffmpeg-layer:1
        - !Ref SharedUtilsLayer
      Environment:
        Variables:
          WEBSOCKET_API_ENDPOINT: !Sub ${ConversationWebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/prod
          CONNECTIONS_TABLE: !Ref WebSocketConnectionsTable
          KMS_KEY_ARN: !GetAtt DataEncryptionKey.Arn
          S3_BUCKET: virtual-legacy
          TABLE_QUESTION_STATUS: userQuestionStatusDB
          TABLE_QUESTION_PROGRESS: userQuestionLevelProgressDB
          CONVERSATION_STATE_TABLE: !Ref ConversationStateTable
          TABLE_SUBSCRIPTIONS: !Ref UserSubscriptionsTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref WebSocketConnectionsTable
        - Statement:
            - Effect: Allow
              Action:
                - execute-api:ManageConnections
              Resource: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ConversationWebSocketApi}/*
        - Statement:
            - Effect: Allow
              Action:
                - transcribe:StartTranscriptionJob
                - transcribe:GetTranscriptionJob
              Resource: !Sub 'arn:aws:transcribe:${AWS::Region}:${AWS::AccountId}:transcription-job/*'
            - Effect: Allow
              Action:
                - transcribe:StartStreamTranscription
              Resource: '*'
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource:
                - arn:aws:bedrock:us-east-1::foundation-model/anthropic.claude-3-5-sonnet-20241022-v2:0
                - arn:aws:bedrock:us-east-1::foundation-model/anthropic.claude-3-5-sonnet-20240620-v1:0
                - arn:aws:bedrock:us-east-1::foundation-model/anthropic.claude-3-haiku-20240307-v1:0
                - !Sub arn:aws:bedrock:us-east-1:${AWS::AccountId}:inference-profile/us.anthropic.claude-3-5-haiku-20241022-v1:0
        - Statement:
            - Effect: Allow
              Action:
                - polly:SynthesizeSpeech
              Resource: '*'
              Condition:
                StringEquals:
                  'aws:RequestedRegion': !Ref AWS::Region
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
                - ssm:GetParameters
              Resource:
                - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/virtuallegacy/conversation/*
                - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/virtuallegacy/deepgram/*
        - Statement:
            - Effect: Allow
              Action:
                - s3:PutObject
                - s3:GetObject
              Resource:
                - arn:aws:s3:::virtual-legacy/conversations/*
                - arn:aws:s3:::virtual-legacy/test-audio/*
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:GetItem
              Resource:
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/userQuestionStatusDB
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/userQuestionLevelProgressDB
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:DeleteItem
              Resource: !GetAtt ConversationStateTable.Arn
        - Statement:
            - Effect: Allow
              Action:
                - ssm:DeleteParameter
              Resource: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/virtuallegacy/user_completed_count/*
        - LambdaInvokePolicy:
            FunctionName: !Ref SummarizeTranscriptFunction
        - Statement:
            - Effect: Allow
              Action:
                - kms:Decrypt
                - kms:DescribeKey
                - kms:GenerateDataKey
              Resource: !GetAtt DataEncryptionKey.Arn
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
              Resource: !GetAtt UserSubscriptionsTable.Arn
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
                - ssm:GetParameters
              Resource:
                - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/soulreel/plans/*

  WebSocketDefaultPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref WebSocketDefaultFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ConversationWebSocketApi}/*

  # Cognito Trigger Functions
  PreSignupFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/cognitoTriggers/preSignup/
      Handler: app.lambda_handler
      Architectures:
        - arm64
      Timeout: 10
      Policies:
        - DynamoDBWritePolicy:
            TableName: !Ref PersonaSignupTempTable
        - Statement:
            - Effect: Allow
              Action:
                - kms:Decrypt
                - kms:DescribeKey
              Resource: !GetAtt DataEncryptionKey.Arn

  SharedUtilsLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: soulreel-shared-utils
      ContentUri: functions/shared/
      CompatibleRuntimes:
        - python3.12
      CompatibleArchitectures:
        - arm64
        - x86_64
      RetentionPolicy: Retain

  StripeDependencyLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: stripe-python-layer
      Description: Stripe Python SDK
      ContentUri: layers/stripe/
      CompatibleRuntimes:
        - python3.12
      CompatibleArchitectures:
        - arm64
    Metadata:
      BuildMethod: python3.12

  PostConfirmationFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/cognitoTriggers/postConfirmation/
      Handler: app.lambda_handler
      Architectures:
        - arm64
      Timeout: 10
      Layers:
        - !Ref SharedUtilsLayer
      Environment:
        Variables:
          SENDER_EMAIL: noreply@soulreel.net
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:DeleteItem
              Resource: !GetAtt PersonaSignupTempTable.Arn
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
              Resource: !GetAtt PersonaRelationshipsTable.Arn
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:Query
              Resource:
                - !GetAtt AccessConditionsTable.Arn
                - !Sub "${AccessConditionsTable.Arn}/index/*"
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:AdminUpdateUserAttributes
              Resource: !Ref ExistingUserPoolArn
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: '*'
        - Statement:
            - Effect: Allow
              Action:
                - kms:Decrypt
                - kms:DescribeKey
                - kms:Encrypt
                - kms:GenerateDataKey
              Resource: !GetAtt DataEncryptionKey.Arn
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
              Resource: !GetAtt UserSubscriptionsTable.Arn
        - Statement:
            - Effect: Allow
              Action:
                - cloudwatch:PutMetricData
              Resource: '*'
              Condition:
                StringEquals:
                  cloudwatch:namespace: 'SoulReel/Persona'

