                - s3:GetObject
              Resource: 
                - arn:aws:s3:::virtual-legacy/transcripts/*
                - arn:aws:s3:::virtual-legacy/user-responses/*
        - Statement:
            - Effect: Allow
              Action:
                - s3:PutObject
              Resource: arn:aws:s3:::virtual-legacy/user-responses/*
        - Statement:
