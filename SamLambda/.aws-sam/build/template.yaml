AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: 'Virtual-Legacy-MVP-1

  SAM Template for Virtual-Legacy-MVP-1 - v2

  '
Parameters:
  ExistingUserPoolId:
    Type: String
    Default: us-east-1_KsG65yYlo
    Description: Existing Cognito User Pool ID
  ExistingUserPoolArn:
    Type: String
    Default: arn:aws:cognito-idp:us-east-1:962214556635:userpool/us-east-1_KsG65yYlo
    Description: Existing Cognito User Pool ARN
  SecurityAlertEmail:
    Type: String
    Default: ''
    Description: Email address for GuardDuty security alerts (leave empty to skip
      email subscription)
Globals:
  Function:
    Timeout: 3
    MemorySize: 128
    Runtime: python3.12
  Api:
    Cors:
      AllowMethods: '''GET,POST,PUT,OPTIONS'''
      AllowHeaders: '''Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'''
      AllowOrigin: '''*'''
    Auth:
      Authorizers:
        CognitoAuthorizer:
          UserPoolArn:
            Ref: ExistingUserPoolArn
Conditions:
  HasSecurityAlertEmail:
    Fn::Not:
    - Fn::Equals:
      - Ref: SecurityAlertEmail
      - ''
Resources:
  DataEncryptionKey:
    Type: AWS::KMS::Key
    Properties:
      Description: Customer-managed key for encrypting SoulReel data at rest
      EnableKeyRotation: true
      Tags:
      - Key: Project
        Value: SoulReel
      - Key: SecurityPhase
        Value: Phase1
      - Key: CostCenter
        Value: Security
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
        - Sid: Enable IAM User Permissions
          Effect: Allow
          Principal:
            AWS:
              Fn::Sub: arn:aws:iam::${AWS::AccountId}:root
          Action: kms:*
          Resource: '*'
        - Sid: Allow CloudWatch Logs
          Effect: Allow
          Principal:
            Service: logs.amazonaws.com
          Action:
          - kms:Encrypt
          - kms:Decrypt
          - kms:ReEncrypt*
          - kms:GenerateDataKey*
          - kms:CreateGrant
          - kms:DescribeKey
          Resource: '*'
          Condition:
            ArnLike:
              kms:EncryptionContext:aws:logs:arn:
                Fn::Sub: arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*
        - Sid: Allow Lambda Service
          Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
          Action:
          - kms:Decrypt
          - kms:DescribeKey
          Resource: '*'
          Condition:
            StringEquals:
              kms:ViaService:
                Fn::Sub: lambda.${AWS::Region}.amazonaws.com
        - Sid: Allow DynamoDB Service
          Effect: Allow
          Principal:
            Service: dynamodb.amazonaws.com
          Action:
          - kms:Encrypt
          - kms:Decrypt
          - kms:ReEncrypt*
          - kms:GenerateDataKey*
          - kms:CreateGrant
          - kms:DescribeKey
          Resource: '*'
          Condition:
            StringEquals:
              kms:ViaService:
                Fn::Sub: dynamodb.${AWS::Region}.amazonaws.com
        - Sid: Allow S3 Service
          Effect: Allow
          Principal:
            Service: s3.amazonaws.com
          Action:
          - kms:Encrypt
          - kms:Decrypt
          - kms:ReEncrypt*
          - kms:GenerateDataKey*
          - kms:CreateGrant
          - kms:DescribeKey
          Resource: '*'
          Condition:
            StringEquals:
              kms:ViaService:
                Fn::Sub: s3.${AWS::Region}.amazonaws.com
        - Sid: Allow CloudTrail
          Effect: Allow
          Principal:
            Service: cloudtrail.amazonaws.com
          Action:
          - kms:GenerateDataKey*
          - kms:DecryptDataKey
          Resource: '*'
          Condition:
            StringLike:
              kms:EncryptionContext:aws:cloudtrail:arn:
                Fn::Sub: arn:aws:cloudtrail:*:${AWS::AccountId}:trail/*
        - Sid: Allow IAM Principals with KMS Permissions
          Effect: Allow
          Principal:
            AWS:
              Fn::Sub: arn:aws:iam::${AWS::AccountId}:root
          Action:
          - kms:Decrypt
          - kms:DescribeKey
          - kms:GenerateDataKey
          Resource: '*'
          Condition:
            StringEquals:
              kms:CallerAccount:
                Ref: AWS::AccountId
  DataEncryptionKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: alias/soulreel-data-encryption
      TargetKeyId:
        Ref: DataEncryptionKey
  AuditLogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName:
        Fn::Sub: soulreel-audit-logs-${AWS::AccountId}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
        - ServerSideEncryptionByDefault:
            SSEAlgorithm: aws:kms
            KMSMasterKeyID:
              Fn::GetAtt:
              - DataEncryptionKey
              - Arn
          BucketKeyEnabled: true
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
        - Id: TransitionToGlacier
          Status: Enabled
          Transitions:
          - TransitionInDays: 30
            StorageClass: GLACIER
        - Id: DeleteOldLogs
          Status: Enabled
          ExpirationInDays: 90
      Tags:
      - Key: Project
        Value: SoulReel
      - Key: SecurityPhase
        Value: Phase1
      - Key: CostCenter
        Value: Security
  AuditLogBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket:
        Ref: AuditLogBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Sid: AWSCloudTrailAclCheck
          Effect: Allow
          Principal:
            Service: cloudtrail.amazonaws.com
          Action: s3:GetBucketAcl
          Resource:
            Fn::GetAtt:
            - AuditLogBucket
            - Arn
        - Sid: AWSCloudTrailWrite
          Effect: Allow
          Principal:
            Service: cloudtrail.amazonaws.com
          Action: s3:PutObject
          Resource:
            Fn::Sub: ${AuditLogBucket.Arn}/AWSLogs/${AWS::AccountId}/*
          Condition:
            StringEquals:
              s3:x-amz-acl: bucket-owner-full-control
  DataAccessTrail:
    Type: AWS::CloudTrail::Trail
    DependsOn: AuditLogBucketPolicy
    Properties:
      TrailName: soulreel-data-access-trail
      S3BucketName:
        Ref: AuditLogBucket
      IsLogging: true
      IsMultiRegionTrail: true
      EnableLogFileValidation: true
      IncludeGlobalServiceEvents: true
      Tags:
      - Key: Project
        Value: SoulReel
      - Key: SecurityPhase
        Value: Phase1
      - Key: CostCenter
        Value: Security
      EventSelectors:
      - ReadWriteType: All
        IncludeManagementEvents: true
        DataResources:
        - Type: AWS::S3::Object
          Values:
          - arn:aws:s3:::virtual-legacy/*
      - ReadWriteType: All
        IncludeManagementEvents: false
        DataResources:
        - Type: AWS::DynamoDB::Table
          Values:
          - Fn::GetAtt:
            - PersonaRelationshipsTable
            - Arn
          - Fn::GetAtt:
            - EngagementTable
            - Arn
          - Fn::Sub: arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/userQuestionStatusDB
          - Fn::Sub: arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/userQuestionLevelProgressDB
          - Fn::Sub: arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/userStatusDB
  GuardDutyDetector:
    Type: AWS::GuardDuty::Detector
    Properties:
      Enable: true
      FindingPublishingFrequency: FIFTEEN_MINUTES
      DataSources:
        S3Logs:
          Enable: true
      Tags:
      - Key: Project
        Value: SoulReel
      - Key: SecurityPhase
        Value: Phase1
      - Key: CostCenter
        Value: Security
  SecurityAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: soulreel-security-alerts
      DisplayName: SoulReel Security Alerts
      Tags:
      - Key: Project
        Value: SoulReel
      - Key: SecurityPhase
        Value: Phase1
      - Key: CostCenter
        Value: Security
  SecurityAlertTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
      - Ref: SecurityAlertTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Sid: AllowEventBridgeToPublish
          Effect: Allow
          Principal:
            Service: events.amazonaws.com
          Action: sns:Publish
          Resource:
            Ref: SecurityAlertTopic
  SecurityAlertEmailSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasSecurityAlertEmail
    Properties:
      Protocol: email
      TopicArn:
        Ref: SecurityAlertTopic
      Endpoint:
        Ref: SecurityAlertEmail
  GuardDutyAlertRule:
    Type: AWS::Events::Rule
    Properties:
      Name: soulreel-guardduty-high-severity-alerts
      Description: Route high-severity GuardDuty findings (severity >= 7.0) to SNS
      State: ENABLED
      EventPattern:
        source:
        - aws.guardduty
        detail-type:
        - GuardDuty Finding
        detail:
          severity:
          - numeric:
            - '>='
            - 7.0
      Targets:
      - Arn:
          Ref: SecurityAlertTopic
        Id: SecurityAlertTopicTarget
  GatewayResponseUnauthorized:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      RestApiId:
        Ref: ServerlessRestApi
      ResponseType: UNAUTHORIZED
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: '''*'''
        gatewayresponse.header.Access-Control-Allow-Headers: '''Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'''
        gatewayresponse.header.Access-Control-Allow-Methods: '''GET,POST,PUT,DELETE,OPTIONS'''
  GatewayResponseDefault4XX:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      RestApiId:
        Ref: ServerlessRestApi
      ResponseType: DEFAULT_4XX
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: '''*'''
        gatewayresponse.header.Access-Control-Allow-Headers: '''Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'''
        gatewayresponse.header.Access-Control-Allow-Methods: '''GET,POST,PUT,DELETE,OPTIONS'''
  GatewayResponseDefault5XX:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      RestApiId:
        Ref: ServerlessRestApi
      ResponseType: DEFAULT_5XX
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: '''*'''
        gatewayresponse.header.Access-Control-Allow-Headers: '''Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'''
        gatewayresponse.header.Access-Control-Allow-Methods: '''GET,POST,PUT,DELETE,OPTIONS'''
  PersonaSignupTempTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: PersonaSignupTempDB
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: userName
        AttributeType: S
      KeySchema:
      - AttributeName: userName
        KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId:
          Fn::GetAtt:
          - DataEncryptionKey
          - Arn
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
  PersonaRelationshipsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: PersonaRelationshipsDB
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: initiator_id
        AttributeType: S
      - AttributeName: related_user_id
        AttributeType: S
      KeySchema:
      - AttributeName: initiator_id
        KeyType: HASH
      - AttributeName: related_user_id
        KeyType: RANGE
      GlobalSecondaryIndexes:
      - IndexName: RelatedUserIndex
        KeySchema:
        - AttributeName: related_user_id
          KeyType: HASH
        Projection:
          ProjectionType: ALL
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId:
          Fn::GetAtt:
          - DataEncryptionKey
          - Arn
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
  AccessConditionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AccessConditionsDB
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: relationship_key
        AttributeType: S
      - AttributeName: condition_id
        AttributeType: S
      - AttributeName: condition_type
        AttributeType: S
      - AttributeName: activation_date
        AttributeType: S
      KeySchema:
      - AttributeName: relationship_key
        KeyType: HASH
      - AttributeName: condition_id
        KeyType: RANGE
      GlobalSecondaryIndexes:
      - IndexName: ConditionTypeIndex
        KeySchema:
        - AttributeName: condition_type
          KeyType: HASH
        Projection:
          ProjectionType: ALL
      - IndexName: ActivationDateIndex
        KeySchema:
        - AttributeName: condition_type
          KeyType: HASH
        - AttributeName: activation_date
          KeyType: RANGE
        Projection:
          ProjectionType: ALL
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId:
          Fn::GetAtt:
          - DataEncryptionKey
          - Arn
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
  EngagementTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: EngagementDB
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: userId
        AttributeType: S
      KeySchema:
      - AttributeName: userId
        KeyType: HASH
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId:
          Fn::GetAtt:
          - DataEncryptionKey
          - Arn
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
  WebSocketConnectionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: WebSocketConnectionsDB
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: connectionId
        AttributeType: S
      KeySchema:
      - AttributeName: connectionId
        KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      SSESpecification:
        SSEEnabled: true
  ConversationWebSocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: ConversationWebSocketApi
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: $request.body.action
  WebSocketAuthorizer:
    Type: AWS::ApiGatewayV2::Authorizer
    Properties:
      Name: CognitoWebSocketAuthorizer
      ApiId:
        Ref: ConversationWebSocketApi
      AuthorizerType: REQUEST
      AuthorizerUri:
        Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WebSocketAuthorizerFunction.Arn}/invocations
      IdentitySource:
      - route.request.querystring.token
  ConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId:
        Ref: ConversationWebSocketApi
      RouteKey: $connect
      AuthorizationType: CUSTOM
      AuthorizerId:
        Ref: WebSocketAuthorizer
      Target:
        Fn::Sub: integrations/${ConnectIntegration}
  ConnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId:
        Ref: ConversationWebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri:
        Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WebSocketConnectFunction.Arn}/invocations
  DisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId:
        Ref: ConversationWebSocketApi
      RouteKey: $disconnect
      Target:
        Fn::Sub: integrations/${DisconnectIntegration}
  DisconnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId:
        Ref: ConversationWebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri:
        Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WebSocketDisconnectFunction.Arn}/invocations
  DefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId:
        Ref: ConversationWebSocketApi
      RouteKey: $default
      Target:
        Fn::Sub: integrations/${DefaultIntegration}
  DefaultIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId:
        Ref: ConversationWebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri:
        Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WebSocketDefaultFunction.Arn}/invocations
  WebSocketStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId:
        Ref: ConversationWebSocketApi
      StageName: prod
      AutoDeploy: true
  WebSocketAuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: WebSocketAuthorizerFunction
      Handler: app.lambda_handler
      Runtime: python3.12
      Architectures:
      - arm64
      Timeout: 10
      Environment:
        Variables:
          USER_POOL_ID:
            Ref: ExistingUserPoolId
      Policies:
      - Statement:
        - Effect: Allow
          Action:
          - cognito-idp:GetUser
          Resource:
            Ref: ExistingUserPoolArn
    Metadata:
      SamResourceId: WebSocketAuthorizerFunction
  WebSocketAuthorizerPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName:
        Ref: WebSocketAuthorizerFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn:
        Fn::Sub: arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ConversationWebSocketApi}/*
  WebSocketConnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: WebSocketConnectFunction
      Handler: app.lambda_handler
      Runtime: python3.12
      Architectures:
      - arm64
      Timeout: 10
      Policies:
      - DynamoDBWritePolicy:
          TableName:
            Ref: WebSocketConnectionsTable
    Metadata:
      SamResourceId: WebSocketConnectFunction
  WebSocketConnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName:
        Ref: WebSocketConnectFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn:
        Fn::Sub: arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ConversationWebSocketApi}/*
  WebSocketDisconnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: WebSocketDisconnectFunction
      Handler: app.lambda_handler
      Runtime: python3.12
      Architectures:
      - arm64
      Timeout: 10
      Policies:
      - Statement:
        - Effect: Allow
          Action:
          - dynamodb:DeleteItem
          Resource:
            Fn::GetAtt:
            - WebSocketConnectionsTable
            - Arn
    Metadata:
      SamResourceId: WebSocketDisconnectFunction
  WebSocketDisconnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName:
        Ref: WebSocketDisconnectFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn:
        Fn::Sub: arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ConversationWebSocketApi}/*
  WebSocketDefaultFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: WebSocketDefaultFunction
      Handler: app.lambda_handler
      Runtime: python3.12
      Architectures:
      - x86_64
      Timeout: 30
      MemorySize: 512
      Layers:
      - arn:aws:lambda:us-east-1:962214556635:layer:ffmpeg-layer:1
      Environment:
        Variables:
          WEBSOCKET_API_ENDPOINT:
            Fn::Sub: ${ConversationWebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/prod
          CONNECTIONS_TABLE:
            Ref: WebSocketConnectionsTable
          KMS_KEY_ARN:
            Fn::GetAtt:
            - DataEncryptionKey
            - Arn
      Policies:
      - DynamoDBReadPolicy:
          TableName:
            Ref: WebSocketConnectionsTable
      - Statement:
        - Effect: Allow
          Action:
          - execute-api:ManageConnections
          Resource:
            Fn::Sub: arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ConversationWebSocketApi}/*
      - Statement:
        - Effect: Allow
          Action:
          - transcribe:StartTranscriptionJob
          - transcribe:GetTranscriptionJob
          Resource:
            Fn::Sub: arn:aws:transcribe:${AWS::Region}:${AWS::AccountId}:transcription-job/*
        - Effect: Allow
          Action:
          - transcribe:StartStreamTranscription
          Resource: '*'
      - Statement:
        - Effect: Allow
          Action:
          - bedrock:InvokeModel
          Resource:
          - arn:aws:bedrock:us-east-1::foundation-model/anthropic.claude-3-5-sonnet-20241022-v2:0
          - arn:aws:bedrock:us-east-1::foundation-model/anthropic.claude-3-5-sonnet-20240620-v1:0
          - arn:aws:bedrock:us-east-1::foundation-model/anthropic.claude-3-haiku-20240307-v1:0
          - Fn::Sub: arn:aws:bedrock:us-east-1:${AWS::AccountId}:inference-profile/us.anthropic.claude-3-5-haiku-20241022-v1:0
      - Statement:
        - Effect: Allow
          Action:
          - polly:SynthesizeSpeech
          Resource: '*'
          Condition:
            StringEquals:
              aws:RequestedRegion:
                Ref: AWS::Region
      - Statement:
        - Effect: Allow
          Action:
          - ssm:GetParameter
          Resource:
          - Fn::Sub: arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/virtuallegacy/conversation/*
          - Fn::Sub: arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/virtuallegacy/deepgram/*
      - Statement:
        - Effect: Allow
          Action:
          - s3:PutObject
          - s3:GetObject
          Resource:
          - arn:aws:s3:::virtual-legacy/conversations/*
          - arn:aws:s3:::virtual-legacy/test-audio/*
      - Statement:
        - Effect: Allow
          Action:
          - dynamodb:PutItem
          - dynamodb:GetItem
          Resource:
          - arn:aws:dynamodb:*:*:table/userQuestionStatusDB
          - arn:aws:dynamodb:*:*:table/userQuestionLevelProgressDB
      - Statement:
        - Effect: Allow
          Action:
          - ssm:DeleteParameter
          Resource:
            Fn::Sub: arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/virtuallegacy/user_completed_count/*
      - LambdaInvokePolicy:
          FunctionName:
            Ref: SummarizeTranscriptFunction
      - Statement:
        - Effect: Allow
          Action:
          - kms:Decrypt
          - kms:DescribeKey
          - kms:GenerateDataKey
          Resource:
            Fn::GetAtt:
            - DataEncryptionKey
            - Arn
    Metadata:
      SamResourceId: WebSocketDefaultFunction
  WebSocketDefaultPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName:
        Ref: WebSocketDefaultFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn:
        Fn::Sub: arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ConversationWebSocketApi}/*
  PreSignupFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: PreSignupFunction
      Handler: app.lambda_handler
      Architectures:
      - arm64
      Timeout: 10
      Policies:
      - DynamoDBWritePolicy:
          TableName:
            Ref: PersonaSignupTempTable
      - Statement:
        - Effect: Allow
          Action:
          - kms:Decrypt
          - kms:DescribeKey
          Resource:
            Fn::GetAtt:
            - DataEncryptionKey
            - Arn
    Metadata:
      SamResourceId: PreSignupFunction
  PostConfirmationFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: PostConfirmationFunction
      Handler: app.lambda_handler
      Architectures:
      - arm64
      Timeout: 10
      Environment:
        Variables:
          SENDER_EMAIL: noreply@soulreel.net
      Policies:
      - Statement:
        - Effect: Allow
          Action:
          - dynamodb:GetItem
          - dynamodb:PutItem
          - dynamodb:DeleteItem
          Resource:
            Fn::GetAtt:
            - PersonaSignupTempTable
            - Arn
      - Statement:
        - Effect: Allow
          Action:
          - dynamodb:PutItem
          Resource:
            Fn::GetAtt:
            - PersonaRelationshipsTable
            - Arn
      - Statement:
        - Effect: Allow
          Action:
          - dynamodb:PutItem
          - dynamodb:Query
          Resource:
          - Fn::GetAtt:
            - AccessConditionsTable
            - Arn
          - Fn::Sub: ${AccessConditionsTable.Arn}/index/*
      - Statement:
        - Effect: Allow
          Action:
          - cognito-idp:AdminUpdateUserAttributes
          Resource:
            Ref: ExistingUserPoolArn
      - Statement:
        - Effect: Allow
          Action:
          - ses:SendEmail
          - ses:SendRawEmail
          Resource: '*'
      - Statement:
        - Effect: Allow
          Action:
          - kms:Decrypt
          - kms:DescribeKey
          Resource:
            Fn::GetAtt:
            - DataEncryptionKey
            - Arn
    Metadata:
      SamResourceId: PostConfirmationFunction
  GetNumQuestionTypesFunction:
    Type: AWS::Serverless::Function
    Properties:
