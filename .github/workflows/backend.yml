# Backend CI/CD pipeline
name: Backend Deploy

on:
  push:
    branches: [master]
    paths:
      - 'SamLambda/**'
      - '.github/workflows/backend.yml'

jobs:
  deploy:
    name: SAM Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for OIDC token request

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            SamLambda/functions/**/requirements.txt
            SamLambda/requirements-dev.txt

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Cache SAM build
        uses: actions/cache@v4
        with:
          path: SamLambda/.aws-sam
          key: sam-build-${{ hashFiles('SamLambda/**/requirements.txt', 'SamLambda/functions/**/*.py', 'SamLambda/template.yml') }}
          restore-keys: |
            sam-build-

      - name: Validate template
        run: sam validate --lint
        working-directory: SamLambda

      - name: Build
        run: sam build --parallel --cached
        working-directory: SamLambda

      - name: Install test dependencies
        run: pip install -r requirements-dev.txt
        working-directory: SamLambda

      - name: Run smoke tests
        run: python -m pytest tests/test_imports.py -v --tb=short
        working-directory: SamLambda

      - name: Detect change type
        id: change-type
        run: |
          TEMPLATE_CHANGED=$(git diff --name-only HEAD~1 HEAD -- SamLambda/template.yml | wc -l | tr -d ' ')
          echo "template_changed=$TEMPLATE_CHANGED" >> "$GITHUB_OUTPUT"
          if [ "$TEMPLATE_CHANGED" -eq "0" ]; then
            echo "Code-only change detected — will use sam sync --code"
          else
            echo "Infrastructure change detected — will use sam deploy"
          fi

      - name: Deploy (code-only via sam sync)
        if: steps.change-type.outputs.template_changed == '0'
        run: sam sync --code --stack-name Virtual-Legacy-MVP-1 --no-watch --region us-east-1
        working-directory: SamLambda

      - name: Deploy (full via CloudFormation)
        if: steps.change-type.outputs.template_changed != '0'
        run: sam deploy --no-confirm-changeset --no-fail-on-empty-changeset
        working-directory: SamLambda
